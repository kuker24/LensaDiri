name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTH_SESSION_SECRET: ci-auth-session-secret-at-least-32-characters
  CSRF_SECRET: ci-csrf-secret-at-least-32-characters
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
  RATE_LIMIT_SECRET: ci-rate-limit-secret-at-least-32-characters
  TOKEN_HASH_PEPPER: ci-token-hash-pepper-at-least-32-characters

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Dependency audit
        run: npm audit

  database-and-e2e:
    name: Database and browser tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start and reset disposable Supabase
        run: |
          npm run db:start
          npm run db:reset

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: npm run test:integration

      - name: Database security tests
        run: npm run test:db

      - name: Seed replay gate
        run: npm run test:seed-replay

      - name: Reset disposable database for E2E
        run: |
          npm run db:reset
          docker exec supabase_db_lensa-diri psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "update public.feature_flags set enabled = true where key = 'FEATURE_MODULAR_COMPOSER'"

      - name: Run Playwright
        run: npm run test:e2e

      - name: Stop disposable Supabase
        if: always()
        run: npx supabase stop --no-backup
